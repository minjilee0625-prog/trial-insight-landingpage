<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 정보 문의 — Trial Insight</title>
<meta name="description" content="Trial Insight 제품 데모 문의 페이지입니다. 준비 중이며, 이메일 또는 전화로 문의하실 수 있습니다.">
<link rel="icon" type="image/png" href="logo/favicon-ti.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: #080f1e;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.wrap {
  text-align: center;
  padding: 2rem 1.5rem;
  max-width: 540px;
}

.logo {
  margin-bottom: 2.5rem;
}

.logo img {
  height: 48px;
  width: auto;
}

.badge {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #4BA3DE;
  border: 1px solid rgba(75,163,222,0.35);
  border-radius: 99px;
  padding: 0.3rem 1rem;
  margin-bottom: 1.75rem;
}

h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  line-height: 1.3;
  margin-bottom: 1.25rem;
  color: #fff;
}

.desc {
  font-size: 1rem;
  font-weight: 400;
  line-height: 1.75;
  color: rgba(255,255,255,0.65);
  margin-bottom: 2.5rem;
}

.contact-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 1.5rem 2rem;
  margin-bottom: 2rem;
}

.contact-label {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 0.9rem;
}

.contact-item {
  font-size: 1rem;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  line-height: 2;
}

.contact-item a {
  color: #6BBAE8;
  text-decoration: none;
}

.back {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: color 0.2s;
}

.back:hover { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="logo/ti-logo-white.png" alt="Trial Insight">
  </div>

  <div class="badge">Product Inquiry</div>

  <h1>제품 데모는 준비 중입니다</h1>

  <p class="desc">
    문의 주시면 공개 일정에 맞춰<br>담당자가 직접 안내드립니다.
  </p>

  <div class="contact-box">
    <div class="contact-label">문의하기</div>
    <div class="contact-item">
      <a href="mailto:info@nanumspace.com">info@nanumspace.com</a>
    </div>
    <div class="contact-item">063-278-9637</div>
  </div>

  <a href="index.html" class="back">← 랜딩페이지로 돌아가기</a>
</div>
</body>
</html>
